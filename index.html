<!DOCTYPE html>
<html>
<head>
  <title>United Traders AI</title>
</<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0F1F">

<div style="background:rgba(0,0,0,0.7);min-height:100vh;padding:20px;">
  background-image: url('Screenshot_20260411_115513_Google.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: white;
  font-family: sans-serif;
  text-align: center;
">

<img src="InShot_20260320_232112997.jpg"
     style="width:120px;border-radius:50%;box-shadow:0 0 20px #00f;margin-top:20px;">
<p>SMC Sniper Scanner (Logic Engine)</p>

<button onclick="scanMarket()" style="padding:12px 20px;background:#2563eb;color:white;border:none;border-radius:6px;">
Scan Market
</button>

<h2>Signals</h2>
<div id="signals"></div>

<script>
function notifyUser(message){
  if (Notification.permission === "granted") {
    new Notification(message);
  }
}

function requestPermission(){
  if ("Notification" in window) {
    Notification.requestPermission();
  }
}

function generateSMCSignal(pair){

  let trend = Math.random() > 0.5 ? "bullish" : "bearish";
  let liquidity = Math.random() > 0.4;
  let confirmation = Math.random() > 0.4;

  if(!(liquidity && confirmation)) return null;

  let direction = trend === "bullish" ? "BUY" : "SELL";

  let entry = (Math.random()*1000+1000).toFixed(2);
  let sl = direction === "BUY"
    ? (entry - 10).toFixed(2)
    : (parseFloat(entry) + 10).toFixed(2);

  let tp = direction === "BUY"
    ? (parseFloat(entry) + 20).toFixed(2)
    : (entry - 20).toFixed(2);

  notifyUser(pair + " " + direction + " signal!");

  return `
  <div style="background:#111;padding:15px;margin:10px;border-radius:10px;">
    <b>${pair}</b><br>
    Direction: ${direction}<br>
    Entry: ${entry}<br>
    SL: ${sl}<br>
    TP: ${tp}
  </div>`;
}

function scanMarket(){
  let pairs = ["XAUUSD","EURUSD","NAS100","GBPUSD"];
  let output = "";

  pairs.forEach(p=>{
    let signal = generateSMCSignal(p);
    if(signal) output += signal;
  });

  document.getElementById("signals").innerHTML =
    output || "No sniper setups yet...";
}

// ask permission when app loads
requestPermission();
</script>
</html>
