<!DOCTYPE html>
<html>
<head>
  <title>United Traders AI</title>
</<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0F1F">

<body style="background:#0A0F1F;color:white;font-family:sans-serif;text-align:center;">

<h1>UNITED TRADERS AI</h1>
<p>SMC Sniper Scanner (Logic Engine)</p>

<button onclick="scanMarket()" style="padding:12px 20px;background:#2563eb;color:white;border:none;border-radius:6px;">
Scan Market
</button>

<h2>Signals</h2>
<div id="signals"></div>

<script>
function generateSMCSignal(pair){

  // Simulated structured logic
  let trend = Math.random() > 0.5 ? "bullish" : "bearish";
  let liquidity = Math.random() > 0.4;
  let confirmation = Math.random() > 0.4;

  if(!(liquidity && confirmation)) return null;

  let direction = trend === "bullish" ? "BUY" : "SELL";

  let entry = (Math.random()*1000+1000).toFixed(2);
  let sl = direction === "BUY"
    ? (entry - 10).toFixed(2)
    : (parseFloat(entry) + 10).toFixed(2);

  let tp = direction === "BUY"
    ? (parseFloat(entry) + 20).toFixed(2)
    : (entry - 20).toFixed(2);

  return `
  <div style="background:#111;padding:15px;margin:10px;border-radius:10px;">
    <b>${pair}</b><br>
    Trend: ${trend}<br>
    Direction: <span style="color:${direction==="BUY"?"lime":"red"}">${direction}</span><br>
    Entry: ${entry}<br>
    SL: ${sl}<br>
    TP: ${tp}<br>
    Reason: Liquidity sweep + BOS + confirmation
  </div>`;
}

function scanMarket(){
  let pairs = ["XAUUSD","EURUSD","NAS100","GBPUSD"];
  let output = "";

  pairs.forEach(p=>{
    let signal = generateSMCSignal(p);
    if(signal) output += signal;
  });

  document.getElementById("signals").innerHTML =
    output || "No high-probability setups (wait for sniper entry)";
}
</script>

</body>
</html>
